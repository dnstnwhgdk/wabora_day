<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>와보라데이 웃음 측정기</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Jua&display=swap" rel="stylesheet">
<style>
  :root{
    --green: #3DBE6C;
    --green-deep: #1F8A4C;
    --green-pale: #E4F7EC;
    --bg: #F3FBF6;
    --ink: #163A26;
    --ink-soft: #4F7861;
    --paper: #FFFFFF;
    --amber: #FFB400;
    --ring-track: rgba(255,255,255,0.35);
  }
  *{ box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body{
    margin:0; padding:0; width:100%; height:100%;
    background: var(--bg);
    color: var(--ink);
    font-family: "Jua", "Pretendard", "Apple SD Gothic Neo", sans-serif;
    overflow: hidden; touch-action: manipulation;
  }
  #app{
    position: relative; width: 100%; height: 100vh; min-height: 100vh;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
  }
  .hidden{ display: none !important; }

  /* ===================== INTRO ===================== */
  #screen-intro{
    position: relative;
    width: 100%; height: 100%;
    display: flex; flex-direction: column; align-items: center; justify-content: flex-end;
  }
  .collage{
    position: absolute; inset: 0;
    overflow: hidden;
    background: var(--ink);
  }
  .collage img{
    position: absolute; inset: 0;
    width: 100%; height: 100%;
    object-fit: cover;
    opacity: 0;
    transform: scale(1.06);
    transition: opacity 1.4s ease, transform 6s ease-out;
  }
  .collage img.active{
    opacity: 1;
    transform: scale(1.0);
  }
  .collage-shade{
    position: absolute; inset: 0;
    background: linear-gradient(to bottom, rgba(22,58,38,0.15) 0%, rgba(22,58,38,0.25) 40%, rgba(22,58,38,0.88) 88%, rgba(22,58,38,0.96) 100%);
    z-index: 1;
  }
  .intro-content{
    position: relative;
    z-index: 2;
    width: 100%;
    max-width: 460px;
    display: flex; flex-direction: column; align-items: center;
    padding: 0 24px calc(36px + env(safe-area-inset-bottom));
    text-align: center;
  }
  .invite-badge{
    font-family: "Black Han Sans", sans-serif;
    letter-spacing: 0.16em;
    font-size: 13px;
    color: var(--ink);
    background: var(--paper);
    padding: 7px 18px;
    border-radius: 999px;
    margin-bottom: 14px;
    box-shadow: 0 4px 14px rgba(0,0,0,0.18);
  }
  h1.title{
    font-family: "Black Han Sans", sans-serif;
    font-size: clamp(28px, 8vw, 42px);
    color: #fff;
    margin: 0 0 8px;
    line-height: 1.2;
    text-shadow: 0 2px 10px rgba(0,0,0,0.25);
  }
  h1.title .accent{ color: var(--amber); }
  p.sub{
    font-size: clamp(13px, 3.2vw, 16px);
    color: rgba(255,255,255,0.88);
    margin: 0 0 26px;
    max-width: 360px;
  }
  button.cta{
    font-family: "Black Han Sans", sans-serif;
    font-size: 19px;
    color: #fff;
    background: var(--green);
    border: none;
    border-radius: 999px;
    padding: 16px 40px;
    box-shadow: 0 8px 0 var(--green-deep), 0 14px 26px -6px rgba(0,0,0,0.35);
    cursor: pointer;
    transition: transform 0.08s ease, box-shadow 0.08s ease;
    letter-spacing: 0.02em;
    width: 100%;
    max-width: 320px;
  }
  button.cta:active{
    transform: translateY(6px);
    box-shadow: 0 2px 0 var(--green-deep), 0 6px 14px -4px rgba(0,0,0,0.3);
  }
  button.cta:disabled{ opacity: 0.55; cursor: default; box-shadow: none; transform: none; }
  footer.note{
    margin-top: 16px;
    font-size: 11px;
    color: rgba(255,255,255,0.65);
    text-align:center;
    max-width: 300px;
  }
  .intro-error{
    margin-top: 14px;
    font-size: 13px;
    color: #fff;
    background: rgba(0,0,0,0.4);
    border-radius: 12px;
    padding: 10px 16px;
    max-width: 320px;
  }

  /* ===================== COUNTDOWN ===================== */
  #screen-countdown{
    width: 100%; height: 100%;
    background: var(--ink);
    display:flex; flex-direction:column; align-items:center; justify-content:center;
  }
  .count-label{ color: rgba(255,255,255,0.75); font-size: 16px; margin-bottom: 6px; }
  .count-num{
    font-family:"Black Han Sans", sans-serif;
    font-size: 140px;
    color: var(--green);
    line-height: 1;
    animation: pop 0.5s ease;
  }
  @keyframes pop{
    0%{ transform: scale(0.4); opacity:0; }
    60%{ transform: scale(1.15); opacity:1; }
    100%{ transform: scale(1); }
  }

  /* ===================== MEASURE (카메라 풀스크린) ===================== */
  #screen-measure{
    position: relative;
    width: 100%; height: 100%;
    background: #0d1a13;
  }
  #measure-stage{
    position: absolute; inset: 0;
    overflow: hidden;
  }
  #measure-stage video{
    position:absolute; inset:0;
    width:100%; height:100%;
    object-fit: cover;
    transform: scaleX(-1);
  }
  .measure-hud-top{
    position: absolute;
    top: calc(18px + env(safe-area-inset-top));
    left: 0; right: 0;
    display: flex; flex-direction: column; align-items: center;
    z-index: 5;
    pointer-events: none;
  }
  .timer-pill{
    font-family:"Black Han Sans", sans-serif;
    font-size: 15px;
    color: #fff;
    background: rgba(0,0,0,0.4);
    backdrop-filter: blur(6px);
    border-radius: 999px;
    padding: 8px 22px;
    letter-spacing: 0.04em;
  }
  .timer-pill .timer-num{ color: var(--green); font-size: 18px; }

  .measure-hud-bottom{
    position: absolute;
    bottom: calc(28px + env(safe-area-inset-bottom));
    left: 0; right: 0;
    display:flex; flex-direction:column; align-items:center;
    z-index: 5;
    pointer-events: none;
  }
  .live-score{
    font-family:"Black Han Sans", sans-serif;
    font-size: 64px;
    color: #fff;
    text-shadow: 0 2px 14px rgba(0,0,0,0.5);
    line-height: 1;
  }
  .live-score sup{ font-size: 22px; color: rgba(255,255,255,0.8); }
  .face-hint{
    margin-top: 6px;
    font-size: 13px;
    color: rgba(255,255,255,0.85);
    background: rgba(0,0,0,0.35);
    padding: 5px 14px;
    border-radius: 999px;
    min-height: 18px;
  }

  svg.ring{
    position:absolute; inset:0;
    width: 100%; height: 100%;
    pointer-events:none;
    z-index: 4;
  }
  svg.ring rect{
    fill:none;
    stroke-width: 6;
  }
  svg.ring .fill{
    stroke: var(--green);
    transition: stroke-dashoffset 0.12s linear, stroke 0.2s linear;
  }

  /* ===================== RESULT ===================== */
  #screen-result{
    width: 100%; height: 100%;
    background: linear-gradient(180deg, var(--green) 0%, var(--green-deep) 100%);
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    padding: 24px;
  }
  .medal{
    width: 140px; height:140px;
    border-radius: 50%;
    display:flex; align-items:center; justify-content:center;
    background: var(--paper);
    box-shadow: 0 14px 30px -8px rgba(0,0,0,0.3);
    margin-bottom: 20px;
  }
  .medal-score{ font-family:"Black Han Sans", sans-serif; font-size: 40px; color: var(--ink); }
  .medal-max{ font-size: 12px; color: var(--ink-soft); margin-top:-4px; text-align:center;}
  .result-line{
    font-family:"Black Han Sans", sans-serif;
    font-size: clamp(22px,5.5vw,28px);
    text-align:center;
    color: #fff;
    margin: 4px 0 6px;
    padding: 0 10px;
  }
  .result-sub{
    font-size: 14px;
    color: rgba(255,255,255,0.9);
    text-align:center;
    margin-bottom: 26px;
  }
  button.cta.on-green{
    background: #fff;
    color: var(--green-deep);
    box-shadow: 0 8px 0 var(--green-pale), 0 14px 26px -6px rgba(0,0,0,0.25);
  }
  button.cta.on-green:active{
    box-shadow: 0 2px 0 var(--green-pale), 0 6px 14px -4px rgba(0,0,0,0.2);
  }

  @media (prefers-reduced-motion: reduce){
    .count-num{ animation: none; }
    svg.ring .fill{ transition: none; }
    .collage img{ transition: opacity 1.4s ease; }
  }
</style>
</head>
<body>

<div id="app">

  <!-- ============ SCREEN: INTRO ============ -->
  <div class="screen" id="screen-intro">
    <div class="collage" id="collage"></div>
    <div class="collage-shade"></div>
    <div class="intro-content">
      <div class="invite-badge">삼성교회 · 와보라데이</div>
      <h1 class="title">너의 웃음,<br><span class="accent">몇 점</span>일까?</h1>
      <p class="sub">카메라 앞에서 10초간 마음껏 웃어보세요.<br>오늘 하루, 가장 환하게 웃는 사람은 누구일까요?</p>
      <button class="cta" id="btn-start">카메라 켜고 시작하기</button>
      <div class="intro-error hidden" id="intro-error"></div>
      <footer class="note">촬영된 영상은 저장되지 않고, 이 기기에서만 분석돼요.</footer>
    </div>
  </div>

  <!-- ============ SCREEN: COUNTDOWN ============ -->
  <div class="screen hidden" id="screen-countdown">
    <div class="count-label">준비하세요!</div>
    <div class="count-num" id="count-num">3</div>
  </div>

  <!-- ============ SCREEN: MEASURING (풀스크린 카메라) ============ -->
  <div class="screen hidden" id="screen-measure">
    <div id="measure-stage"></div>
    <svg class="ring" viewBox="0 0 100 100" preserveAspectRatio="none">
      <rect class="fill" id="ring-fill" x="3" y="3" width="94" height="94" rx="0"></rect>
    </svg>
    <div class="measure-hud-top">
      <div class="timer-pill">남은 시간 <span class="timer-num" id="time-left">10</span>초</div>
    </div>
    <div class="measure-hud-bottom">
      <div class="live-score" id="live-score">0<sup>점</sup></div>
      <div class="face-hint" id="face-hint">얼굴을 화면 안에 맞춰주세요</div>
    </div>
  </div>

  <!-- ============ SCREEN: RESULT ============ -->
  <div class="screen hidden" id="screen-result">
    <div class="medal">
      <div>
        <div class="medal-score" id="result-score">0</div>
        <div class="medal-max">/ 100점</div>
      </div>
    </div>
    <div class="result-line" id="result-line">측정 중...</div>
    <div class="result-sub" id="result-sub"></div>
    <button class="cta on-green" id="btn-retry">다시 도전하기</button>
  </div>

</div>

  ];

  const collageRoot = document.getElementById('collage');
  let collageOrder = [0,1,2,3,4].sort(() => Math.random() - 0.5);
  let collageIdx = 0;
  const collageImgs = [];

  function initCollage(){
    PHOTOS.forEach((src) => {
      const img = document.createElement('img');
      img.src = src;
      img.alt = '';
      collageRoot.appendChild(img);
      collageImgs.push(img);
    });
    showCollage(0);
  }
  function showCollage(i){
    collageImgs.forEach(im => im.classList.remove('active'));
    const realIdx = collageOrder[i % collageOrder.length];
    collageImgs[realIdx].classList.add('active');
  }
  function startCollageLoop(){
    setInterval(() => {
      collageIdx++;
      showCollage(collageIdx);
    }, 3800);
  }
  initCollage();
  startCollageLoop();

  // ---------- DOM refs ----------
  const screens = {
    intro: document.getElementById('screen-intro'),
    countdown: document.getElementById('screen-countdown'),
    measure: document.getElementById('screen-measure'),
    result: document.getElementById('screen-result'),
  };
  const btnStart = document.getElementById('btn-start');
  const btnRetry = document.getElementById('btn-retry');
  const introError = document.getElementById('intro-error');
  const measureStage = document.getElementById('measure-stage');
  const countNumEl = document.getElementById('count-num');
  const ringFill = document.getElementById('ring-fill');
  const timeLeftEl = document.getElementById('time-left');
  const liveScoreEl = document.getElementById('live-score');
  const faceHintEl = document.getElementById('face-hint');
  const resultScoreEl = document.getElementById('result-score');
  const resultLineEl = document.getElementById('result-line');
  const resultSubEl = document.getElementById('result-sub');

  let videoEl = null;
  let stream = null;
  let modelsReady = false;
  let detectLoopHandle = null;
  let measuring = false;

  // 사각 링(둘레) 둘레길이 계산: rect x=3,y=3,w=94,h=94 -> perimeter
  const RING_PERIM = 2 * (94 + 94);

  function showScreen(name){
    Object.values(screens).forEach(s => s.classList.add('hidden'));
    screens[name].classList.remove('hidden');
  }

  ringFill.style.strokeDasharray = RING_PERIM.toFixed(2);

  function setRing(progress, colorVar){
    const offset = RING_PERIM * (1 - progress);
    ringFill.style.strokeDashoffset = offset.toFixed(2);
    if (colorVar) ringFill.style.stroke = colorVar;
  }

  // ---------- 카메라 ----------
  async function startCamera(targetStageEl){
    const video = document.createElement('video');
    video.autoplay = true;
    video.playsInline = true;
    video.setAttribute('playsinline', '');
    video.muted = true;
    video.setAttribute('muted', '');
    targetStageEl.appendChild(video);
    videoEl = video;

    stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: 'user', width: { ideal: 720 }, height: { ideal: 960 } },
      audio: false
    });
    video.srcObject = stream;

    try{
      await video.play();
    } catch(playErr){
      await new Promise(r => setTimeout(r, 150));
      await video.play();
    }
    return video;
  }

  // ---------- face-api 모델 로드 ----------
  async function loadModels(){
    const MODEL_URL = 'https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/weights';
    await Promise.all([
      faceapi.nets.tinyFaceDetector.loadFromUri(MODEL_URL),
      faceapi.nets.faceExpressionNet.loadFromUri(MODEL_URL)
    ]);
    modelsReady = true;
  }

  // ---------- 표정 측정 ----------
  let bestSmoothed = 0;
  let lastHappyForUI = 0;
  let noFaceTicks = 0;
  const smoothWindow = [];
  const SMOOTH_SIZE = 5;

  async function detectTick(){
    if (!videoEl || videoEl.readyState < 2) return;
    try{
      const detection = await faceapi
        .detectSingleFace(videoEl, new faceapi.TinyFaceDetectorOptions({ inputSize: 224, scoreThreshold: 0.4 }))
        .withFaceExpressions();

      if (!detection){
        noFaceTicks++;
        if (noFaceTicks > 3) faceHintEl.textContent = '얼굴이 잘 안 보여요. 더 가까이 와주세요!';
        return;
      }
      noFaceTicks = 0;
      faceHintEl.textContent = measuring ? '좋아요! 계속 웃어보세요 😄' : '얼굴 인식 완료!';

      const exprs = detection.expressions;
      const happy = exprs.happy || 0;
      const surprised = exprs.surprised || 0;
      const raw = Math.min(1, happy + surprised * 0.25);

      smoothWindow.push(raw);
      if (smoothWindow.length > SMOOTH_SIZE) smoothWindow.shift();
      const avg = smoothWindow.reduce((a,b)=>a+b,0) / smoothWindow.length;

      lastHappyForUI = avg;

      if (measuring){
        if (avg > bestSmoothed) bestSmoothed = avg;
        const liveScore = Math.round(avg * 100);
        liveScoreEl.innerHTML = liveScore + '<sup>점</sup>';
      }
    } catch(e){
      // 인식 실패는 조용히 무시 (다음 tick에서 재시도)
    }
  }

  function startDetectLoop(){
    if (detectLoopHandle) return;
    detectLoopHandle = setInterval(detectTick, 180);
  }

  // ---------- 흐름 제어 ----------
  btnStart.addEventListener('click', async () => {
    introError.classList.add('hidden');
    if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia){
      introError.textContent = '이 브라우저에서는 카메라를 사용할 수 없어요. HTTPS 주소로 접속했는지 확인해주세요.';
      introError.classList.remove('hidden');
      return;
    }
    btnStart.disabled = true;
    btnStart.textContent = '카메라 준비 중...';
    try{
      await startCamera(measureStage);
      if (!modelsReady){
        btnStart.textContent = '얼굴 인식 준비 중...';
        await loadModels();
      }
      startDetectLoop();
      btnStart.disabled = false;
      btnStart.textContent = '카메라 켜고 시작하기';
      runCountdown();
    } catch(err){
      if (err && err.name === 'NotAllowedError'){
        introError.textContent = '카메라 권한이 거부됐어요. 브라우저 설정에서 카메라를 허용한 뒤 새로고침해주세요.';
      } else if (err && err.name === 'NotFoundError'){
        introError.textContent = '카메라를 찾을 수 없어요. 기기에 카메라가 있는지 확인해주세요.';
      } else {
        introError.textContent = '카메라를 시작하지 못했어요. 새로고침 후 다시 시도해주세요.';
      }
      introError.classList.remove('hidden');
      btnStart.disabled = false;
      btnStart.textContent = '다시 시도하기';
      console.error(err);
    }
  });

  function runCountdown(){
    showScreen('countdown');
    let n = 3;
    countNumEl.textContent = n;
    restartPop(countNumEl);
    const iv = setInterval(() => {
      n--;
      if (n <= 0){
        clearInterval(iv);
        startMeasuring();
        return;
      }
      countNumEl.textContent = n;
      restartPop(countNumEl);
    }, 700);
  }
  function restartPop(el){
    el.style.animation = 'none';
    void el.offsetWidth;
    el.style.animation = '';
  }

  function startMeasuring(){
    showScreen('measure');
    measuring = true;
    bestSmoothed = 0;
    smoothWindow.length = 0;
    liveScoreEl.innerHTML = '0<sup>점</sup>';
    faceHintEl.textContent = '얼굴을 화면 안에 맞춰주세요';

    const DURATION = 10; // seconds
    let elapsed = 0;
    setRing(0, getRingColor(0));
    timeLeftEl.textContent = DURATION;

    const tickMs = 100;
    const iv = setInterval(() => {
      elapsed += tickMs / 1000;
      const progress = Math.min(1, elapsed / DURATION);
      setRing(progress, getRingColor(lastHappyForUI));
      const remain = Math.max(0, Math.ceil(DURATION - elapsed));
      timeLeftEl.textContent = remain;

      if (elapsed >= DURATION){
        clearInterval(iv);
        measuring = false;
        finishMeasuring();
      }
    }, tickMs);
  }

  function getRingColor(happyLevel){
    if (happyLevel > 0.66) return '#FFB400';
    if (happyLevel > 0.33) return '#9FE0B8';
    return '#3DBE6C';
  }

  function finishMeasuring(){
    const finalScore = Math.round(bestSmoothed * 100);
    showResult(finalScore);
  }

  function showResult(score){
    resultScoreEl.textContent = score;
    const tier = getTier(score);
    resultLineEl.textContent = tier.line;
    resultSubEl.textContent = tier.sub;
    showScreen('result');
  }

  function getTier(score){
    if (score >= 85) return { line: '😆 웃음 폭발 위험!', sub: '오늘의 분위기 메이커는 바로 당신!' };
    if (score >= 65) return { line: '😄 함박웃음 인증', sub: '보는 사람도 같이 웃게 만드는 미소예요.' };
    if (score >= 40) return { line: '🙂 살짝 미소 감지', sub: '조금만 더 활짝 웃어볼까요?' };
    if (score >= 15) return { line: '😐 무표정 경보', sub: '카메라가 부끄러웠나봐요. 한 번 더!' };
    return { line: '🥶 썩은 표정 감지', sub: '괜찮아요, 다시 도전하면 분명 웃길 거예요.' };
  }

  btnRetry.addEventListener('click', () => {
    runCountdown();
  });

})();
</script>
