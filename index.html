<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>와보라데이 웃음측정기</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Jua&display=swap" rel="stylesheet">
<style>
  :root{
    --green: #3DBE6C;
    --green-deep: #1F8A4C;
    --bg: #F3FBF6;
    --ink: #163A26;
    --ink-soft: #4F7861;
    --paper: #FFFFFF;
    --amber: #FFB400;
  }
  *{ box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body{
    margin:0; padding:0; width:100%; height:100%;
    background: var(--bg);
    color: var(--ink);
    font-family: "Jua", "Pretendard", "Apple SD Gothic Neo", sans-serif;
    overflow: hidden; touch-action: manipulation;
  }
  #app{
    position: relative; width: 100%; height: 100vh; min-height: 100vh;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
  }
  .hidden{ display: none !important; }

  /* ===================== INTRO ===================== */
  #screen-intro{
    position: relative;
    width: 100%; height: 100%;
    display: flex; flex-direction: column; align-items: center; justify-content: flex-end;
  }
  .collage{
    position: absolute; inset: 0;
    overflow: hidden;
    background: var(--ink);
  }
  .collage img{
    position: absolute; inset: 0;
    width: 100%; height: 100%;
    object-fit: cover;
    opacity: 0;
    transition: opacity 1.4s ease;
  }
  .collage img.active{ opacity: 1; }
  .collage-shade{
    position: absolute; inset: 0;
    background: linear-gradient(to bottom, rgba(22,58,38,0.15) 0%, rgba(22,58,38,0.25) 40%, rgba(22,58,38,0.88) 88%, rgba(22,58,38,0.96) 100%);
    z-index: 1;
  }
  .intro-content{
    position: relative;
    z-index: 2;
    width: 100%;
    max-width: 460px;
    display: flex; flex-direction: column; align-items: center;
    padding: 0 24px calc(36px + env(safe-area-inset-bottom));
    text-align: center;
  }
  .invite-badge{
    font-family: "Black Han Sans", sans-serif;
    letter-spacing: 0.16em;
    font-size: 13px;
    color: var(--ink);
    background: var(--paper);
    padding: 7px 18px;
    border-radius: 999px;
    margin-bottom: 14px;
    box-shadow: 0 4px 14px rgba(0,0,0,0.18);
  }
  h1.title{
    font-family: "Black Han Sans", sans-serif;
    font-size: clamp(28px, 8vw, 42px);
    color: #fff;
    margin: 0 0 8px;
    line-height: 1.2;
    text-shadow: 0 2px 10px rgba(0,0,0,0.25);
  }
  h1.title .accent{ color: var(--amber); }
  p.sub{
    font-size: clamp(13px, 3.2vw, 16px);
    color: rgba(255,255,255,0.88);
    margin: 0 0 26px;
    max-width: 360px;
  }
  button.cta{
    font-family: "Black Han Sans", sans-serif;
    font-size: 19px;
    color: #fff;
    background: var(--green);
    border: none;
    border-radius: 999px;
    padding: 16px 40px;
    box-shadow: 0 8px 0 var(--green-deep), 0 14px 26px -6px rgba(0,0,0,0.35);
    cursor: pointer;
    transition: transform 0.08s ease, box-shadow 0.08s ease;
    letter-spacing: 0.02em;
    width: 100%;
    max-width: 320px;
  }
  button.cta:active{
    transform: translateY(6px);
    box-shadow: 0 2px 0 var(--green-deep), 0 6px 14px -4px rgba(0,0,0,0.3);
  }
  button.cta:disabled{ opacity: 0.55; cursor: default; box-shadow: none; transform: none; }
  footer.note{
    margin-top: 16px;
    font-size: 11px;
    color: rgba(255,255,255,0.65);
    text-align:center;
    max-width: 300px;
  }
  .intro-error{
    margin-top: 14px;
    font-size: 13px;
    color: #fff;
    background: rgba(0,0,0,0.4);
    border-radius: 12px;
    padding: 10px 16px;
    max-width: 320px;
  }

  /* ===================== COUNTDOWN ===================== */
  #screen-countdown{
    width: 100%; height: 100%;
    background: var(--ink);
    display:flex; flex-direction:column; align-items:center; justify-content:center;
  }
  .count-label{ color: rgba(255,255,255,0.75); font-size: 16px; margin-bottom: 6px; }
  .count-num{
    font-family:"Black Han Sans", sans-serif;
    font-size: 140px;
    color: var(--green);
    line-height: 1;
  }

  /* ===================== MEASURE (카메라 풀스크린) ===================== */
  #screen-measure{
    position: relative;
    width: 100%; height: 100%;
    background: #0d1a13;
  }
  #measure-stage{
    position: absolute; inset: 0;
    overflow: hidden;
  }
  #measure-stage video{
    position:absolute; inset:0;
    width:100%; height:100%;
    object-fit: cover;
    transform: scaleX(-1);
  }
  .measure-hud-top{
    position: absolute;
    top: calc(18px + env(safe-area-inset-top));
    left: 0; right: 0;
    display: flex; flex-direction: column; align-items: center;
    z-index: 5;
    pointer-events: none;
  }
  .timer-pill{
    font-family:"Black Han Sans", sans-serif;
    font-size: 15px;
    color: #fff;
    background: rgba(0,0,0,0.4);
    border-radius: 999px;
    padding: 8px 22px;
    letter-spacing: 0.04em;
  }
  .timer-pill .timer-num{ color: var(--green); font-size: 18px; }

  .measure-hud-bottom{
    position: absolute;
    bottom: calc(28px + env(safe-area-inset-bottom));
    left: 0; right: 0;
    display:flex; flex-direction:column; align-items:center;
    z-index: 5;
    pointer-events: none;
  }
  .live-score{
    font-family:"Black Han Sans", sans-serif;
    font-size: 64px;
    color: #fff;
    text-shadow: 0 2px 14px rgba(0,0,0,0.5);
    line-height: 1;
  }
  .live-score sup{ font-size: 22px; color: rgba(255,255,255,0.8); }
  .face-hint{
    margin-top: 6px;
    font-size: 13px;
    color: rgba(255,255,255,0.85);
    background: rgba(0,0,0,0.35);
    padding: 5px 14px;
    border-radius: 999px;
    min-height: 18px;
  }

  /* ===================== 떠다니는 이모지/멘트 ===================== */
  .floaty-layer{
    position: absolute; inset: 0;
    overflow: hidden;
    z-index: 4;
    pointer-events: none;
  }
  .floaty-item{
    position: absolute;
    bottom: -10%;
    font-family: "Black Han Sans", sans-serif;
    color: #fff;
    text-shadow: 0 2px 8px rgba(0,0,0,0.4);
    white-space: nowrap;
    opacity: 0;
    animation: floatUp 3.2s ease-in forwards;
  }
  .floaty-item.emoji{ font-size: 34px; text-shadow: none; }
  .floaty-item.phrase{ font-size: 15px; background: rgba(0,0,0,0.3); padding: 5px 12px; border-radius: 999px; }
  @keyframes floatUp{
    0%{ opacity: 0; transform: translateY(0) translateX(0) rotate(0deg); }
    12%{ opacity: 1; }
    85%{ opacity: 1; }
    100%{ opacity: 0; transform: translateY(-115vh) translateX(var(--drift, 0px)) rotate(var(--rot, 0deg)); }
  }

  /* ===================== RESULT ===================== */
  #screen-result{
    width: 100%; height: 100%;
    background: linear-gradient(180deg, var(--green) 0%, var(--green-deep) 100%);
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    padding: 24px;
  }
  .result-photo-wrap{
    position: relative;
    margin-bottom: 14px;
  }
  .result-photo{
    width: 168px; height: 168px;
    border-radius: 50%;
    object-fit: cover;
    background: rgba(255,255,255,0.2);
    box-shadow: 0 14px 30px -8px rgba(0,0,0,0.35), 0 0 0 6px rgba(255,255,255,0.5);
    display: block;
  }
  .medal{
    width: 140px; height:140px;
    border-radius: 50%;
    display:flex; align-items:center; justify-content:center;
    background: var(--paper);
    box-shadow: 0 14px 30px -8px rgba(0,0,0,0.3);
    margin-bottom: 20px;
  }
  .medal.medal-overlap{
    position: absolute;
    width: 76px; height: 76px;
    bottom: -10px; right: -10px;
    margin-bottom: 0;
    border: 4px solid var(--green);
  }
  .medal.medal-overlap .medal-score{ font-size: 22px; }
  .medal.medal-overlap .medal-max{ font-size: 9px; margin-top: -2px; }
  .medal-score{ font-family:"Black Han Sans", sans-serif; font-size: 40px; color: var(--ink); }
  .medal-max{ font-size: 12px; color: var(--ink-soft); margin-top:-4px; text-align:center;}
  .result-line{
    font-family:"Black Han Sans", sans-serif;
    font-size: clamp(22px,5.5vw,28px);
    text-align:center;
    color: #fff;
    margin: 4px 0 6px;
    padding: 0 10px;
  }
  .result-sub{
    font-size: 14px;
    color: rgba(255,255,255,0.9);
    text-align:center;
    margin-bottom: 26px;
  }
  button.cta.on-green{
    background: #fff;
    color: var(--green-deep);
    box-shadow: 0 8px 0 #E4F7EC, 0 14px 26px -6px rgba(0,0,0,0.25);
  }
  button.cta.on-green:active{
    box-shadow: 0 2px 0 #E4F7EC, 0 6px 14px -4px rgba(0,0,0,0.2);
  }
</style>
</head>
<body>

<div id="app">

  <!-- ============ SCREEN: INTRO ============ -->
  <div class="screen" id="screen-intro">
    <div class="collage" id="collage"></div>
    <div class="collage-shade"></div>
    <div class="intro-content">
      <div class="invite-badge">삼성교회 · 와보라데이</div>
      <h1 class="title">너의 웃음,<br><span class="accent">몇 점</span>일까?</h1>
      <p class="sub">카메라 앞에서 10초간 마음껏 웃어보세요.<br>오늘 하루, 가장 환하게 웃는 사람은 누구일까요?</p>
      <button class="cta" id="btn-start">카메라 켜고 시작하기</button>
      <div class="intro-error hidden" id="intro-error"></div>
      <footer class="note">촬영된 영상은 저장되지 않고, 이 기기에서만 분석돼요.</footer>
    </div>
  </div>

  <!-- ============ SCREEN: COUNTDOWN ============ -->
  <div class="screen hidden" id="screen-countdown">
    <div class="count-label">준비하세요!</div>
    <div class="count-num" id="count-num">3</div>
  </div>

  <!-- ============ SCREEN: MEASURING (풀스크린 카메라) ============ -->
  <div class="screen hidden" id="screen-measure">
    <div id="measure-stage"></div>
    <div class="floaty-layer" id="floaty-layer"></div>
    <div class="measure-hud-top">
      <div class="timer-pill">남은 시간 <span class="timer-num" id="time-left">10</span>초</div>
    </div>
    <div class="measure-hud-bottom">
      <div class="live-score" id="live-score">0<sup>점</sup></div>
      <div class="face-hint" id="face-hint">얼굴을 화면 안에 맞춰주세요</div>
    </div>
  </div>

  <!-- ============ SCREEN: RESULT ============ -->
  <div class="screen hidden" id="screen-result">
    <div class="result-photo-wrap">
      <img class="result-photo hidden" id="result-photo" alt="">
      <div class="medal medal-overlap">
        <div>
          <div class="medal-score" id="result-score">0</div>
          <div class="medal-max">/ 100점</div>
        </div>
      </div>
    </div>
    <div class="result-line" id="result-line">측정 중...</div>
    <div class="result-sub" id="result-sub"></div>
    <button class="cta on-green" id="btn-back">돌아가기</button>
  </div>

</div>

<!-- face-api.js: 외부 CDN에서 표준 방식으로 로드 -->

  const collageRoot = document.getElementById('collage');
  const collageOrder = [0,1,2,3,4].sort(() => Math.random() - 0.5);
  let collageIdx = 0;
  const collageImgs = [];

  PHOTOS.forEach((src) => {
    const img = document.createElement('img');
    img.src = src;
    img.alt = '';
    collageRoot.appendChild(img);
    collageImgs.push(img);
  });
  function showCollage(i){
    collageImgs.forEach(im => im.classList.remove('active'));
    collageImgs[collageOrder[i % collageOrder.length]].classList.add('active');
  }
  showCollage(0);
  setInterval(() => { collageIdx++; showCollage(collageIdx); }, 3800);

  // ---------- DOM refs ----------
  const screens = {
    intro: document.getElementById('screen-intro'),
    countdown: document.getElementById('screen-countdown'),
    measure: document.getElementById('screen-measure'),
    result: document.getElementById('screen-result'),
  };
  const btnStart = document.getElementById('btn-start');
  const btnBack = document.getElementById('btn-back');
  const introError = document.getElementById('intro-error');
  const measureStage = document.getElementById('measure-stage');
  const floatyLayer = document.getElementById('floaty-layer');
  const countNumEl = document.getElementById('count-num');
  const timeLeftEl = document.getElementById('time-left');
  const liveScoreEl = document.getElementById('live-score');
  const faceHintEl = document.getElementById('face-hint');
  const resultScoreEl = document.getElementById('result-score');
  const resultLineEl = document.getElementById('result-line');
  const resultSubEl = document.getElementById('result-sub');
  const resultPhotoEl = document.getElementById('result-photo');

  let videoEl = null;
  let stream = null;
  let modelsReady = false;
  let detectLoopHandle = null;
  let measuring = false;

  function showScreen(name){
    Object.values(screens).forEach(s => s.classList.add('hidden'));
    screens[name].classList.remove('hidden');
  }

  function showError(msg){
    introError.textContent = msg;
    introError.classList.remove('hidden');
  }

  // ---------- 카메라 시작 ----------
  async function startCamera(){
    const video = document.createElement('video');
    video.autoplay = true;
    video.playsInline = true;
    video.muted = true;
    measureStage.appendChild(video);
    videoEl = video;

    stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: 'user' },
      audio: false
    });
    video.srcObject = stream;
    await video.play();
    return video;
  }

  // ---------- face-api 모델 로드 (jsdelivr CDN에서 표준 방식으로) ----------
  async function loadModels(){
    if (modelsReady) return;
    const MODEL_URLS = [
      'https://cdn.jsdelivr.net/gh/justadudewhohacks/face-api.js/weights',
      'https://raw.githubusercontent.com/justadudewhohacks/face-api.js/master/weights',
      'https://justadudewhohacks.github.io/face-api.js/weights'
    ];
    let lastError = null;
    for (const MODEL_URL of MODEL_URLS){
      try{
        await faceapi.nets.tinyFaceDetector.loadFromUri(MODEL_URL);
        await faceapi.nets.faceExpressionNet.loadFromUri(MODEL_URL);
        modelsReady = true;
        return;
      } catch(e){
        lastError = e;
      }
    }
    throw lastError;
  }

  // ---------- 표정 측정 ----------
  let bestSmoothed = 0;
  let noFaceTicks = 0;
  let lastFloatyHint = 0;
  const smoothWindow = [];
  const SMOOTH_SIZE = 9; // 약 1.6초 — 짧게 반짝 웃은 걸로는 최고점이 잘 안 잡히게

  // 웃음 강도를 매우 엄격하게 채점.
  // face-api.js의 happy 확률은 평범하게 웃기만 해도 0.9~0.99까지 쉽게 올라가므로,
  // 7.0승의 강한 지수 페널티를 줘서 "거의 완벽하게 확신할 만큼" 활짝 웃어야만 고득점이 나오게 한다.
  // (참고: happy=0.85→약32점, 0.9→약48점, 0.95→약70점, 0.98→약87점, 0.99→약93점)
  function scoreFromHappy(happy){
    const h = Math.max(0, Math.min(1, happy));
    return Math.pow(h, 7.0);
  }

  async function detectTick(){
    if (!videoEl || videoEl.readyState < 2) return;
    try{
      const detection = await faceapi
        .detectSingleFace(videoEl, new faceapi.TinyFaceDetectorOptions({ inputSize: 224, scoreThreshold: 0.4 }))
        .withFaceExpressions();

      if (!detection){
        noFaceTicks++;
        if (noFaceTicks > 3) faceHintEl.textContent = '얼굴이 잘 안 보여요. 더 가까이 와주세요!';
        return;
      }
      noFaceTicks = 0;

      const happy = detection.expressions.happy || 0;
      const raw = scoreFromHappy(happy);

      smoothWindow.push(raw);
      if (smoothWindow.length > SMOOTH_SIZE) smoothWindow.shift();
      // 평균이 아니라 "최근 윈도우의 평균"을 쓰되, 윈도우가 다 채워지기 전엔
      // 부족한 칸을 0으로 간주해 초반에 잠깐 튀는 것만으로 고점이 박히지 않게 한다.
      const sum = smoothWindow.reduce((a,b)=>a+b,0);
      const avg = sum / SMOOTH_SIZE;

      if (measuring){
        updateFaceHint(avg);
        if (avg > bestSmoothed){
          bestSmoothed = avg;
          captureBestFrame();
        }
        liveScoreEl.innerHTML = Math.round(avg * 100) + '<sup>점</sup>';
      } else {
        faceHintEl.textContent = '얼굴 인식 완료!';
      }
    } catch(e){
      // 인식 실패는 조용히 무시하고 다음 tick에서 재시도
    }
  }

  function updateFaceHint(avg){
    lastFloatyHint = avg;
    faceHintEl.textContent = pickPhrase(avg);
  }

  // ---------- 측정 중 떠다니는 멘트 ----------
  const HYPE_PHRASES_LOW = ['웃어보세요!', '입꼬리 올리고~', '치즈~ 해볼까요?', '카메라가 기다려요!'];
  const HYPE_PHRASES_MID = ['좋아요, 계속 웃어봐요!', '오 괜찮은데요?', '조금만 더!', '거의 다 왔어요!'];
  const HYPE_PHRASES_HIGH = ['바로 그거예요! 😆', '완벽한 미소!', '대박, 최고점 갱신!', '이 표정 그대로!'];

  function pickPhrase(avg){
    const list = avg > 0.30 ? HYPE_PHRASES_HIGH : avg > 0.08 ? HYPE_PHRASES_MID : HYPE_PHRASES_LOW;
    return list[Math.floor(Math.random() * list.length)];
  }

  // ---------- 최고점 순간 캡처 ----------
  let bestFrameDataUrl = null;
  const captureCanvas = document.createElement('canvas');

  function captureBestFrame(){
    if (!videoEl || videoEl.readyState < 2) return;
    captureCanvas.width = 320;
    captureCanvas.height = 320;
    const ctx = captureCanvas.getContext('2d');
    const vw = videoEl.videoWidth, vh = videoEl.videoHeight;
    if (!vw || !vh) return;
    const side = Math.min(vw, vh);
    const sx = (vw - side) / 2, sy = (vh - side) / 2;
    // 좌우 반전 (셀카처럼 보이게)
    ctx.save();
    ctx.translate(captureCanvas.width, 0);
    ctx.scale(-1, 1);
    ctx.drawImage(videoEl, sx, sy, side, side, 0, 0, captureCanvas.width, captureCanvas.height);
    ctx.restore();
    bestFrameDataUrl = captureCanvas.toDataURL('image/jpeg', 0.85);
  }

  function startDetectLoop(){
    if (detectLoopHandle) return;
    detectLoopHandle = setInterval(detectTick, 180);
  }

  // ---------- 흐름 제어 ----------
  btnStart.addEventListener('click', async () => {
    introError.classList.add('hidden');

    if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia){
      showError('이 브라우저에서는 카메라를 사용할 수 없어요.');
      return;
    }

    btnStart.disabled = true;
    btnStart.textContent = '카메라 준비 중...';

    try{
      await startCamera();
    } catch(err){
      btnStart.disabled = false;
      btnStart.textContent = '다시 시도하기';
      if (err && err.name === 'NotAllowedError'){
        showError('카메라 권한이 거부됐어요. 브라우저 설정에서 카메라를 허용한 뒤 새로고침해주세요.');
      } else if (err && err.name === 'NotFoundError'){
        showError('카메라를 찾을 수 없어요.');
      } else {
        showError('카메라를 시작하지 못했어요: ' + (err && err.message ? err.message : err));
      }
      return;
    }

    btnStart.textContent = '얼굴 인식 준비 중...';
    try{
      await loadModels();
    } catch(err){
      btnStart.disabled = false;
      btnStart.textContent = '다시 시도하기';
      showError('얼굴 인식 모델을 불러오지 못했어요: ' + (err && err.message ? err.message : err));
      return;
    }

    startDetectLoop();
    btnStart.disabled = false;
    btnStart.textContent = '카메라 켜고 시작하기';
    runCountdown();
  });

  function runCountdown(){
    showScreen('countdown');
    let n = 3;
    countNumEl.textContent = n;
    const iv = setInterval(() => {
      n--;
      if (n <= 0){
        clearInterval(iv);
        startMeasuring();
        return;
      }
      countNumEl.textContent = n;
    }, 700);
  }

  function startMeasuring(){
    showScreen('measure');
    measuring = true;
    bestSmoothed = 0;
    bestFrameDataUrl = null;
    smoothWindow.length = 0;
    liveScoreEl.innerHTML = '0<sup>점</sup>';
    faceHintEl.textContent = '얼굴을 화면 안에 맞춰주세요';
    startFloatyLoop();

    const DURATION = 10;
    let elapsed = 0;
    timeLeftEl.textContent = DURATION;

    const tickMs = 100;
    const iv = setInterval(() => {
      elapsed += tickMs / 1000;
      const remain = Math.max(0, Math.ceil(DURATION - elapsed));
      timeLeftEl.textContent = remain;

      if (elapsed >= DURATION){
        clearInterval(iv);
        measuring = false;
        stopFloatyLoop();
        finishMeasuring();
      }
    }, tickMs);
  }

  // ---------- 떠다니는 이모지/멘트 생성 루프 ----------
  const FLOAT_EMOJIS = ['😄','😆','😂','🙂','😁','✨','😺'];
  let floatyHandle = null;

  function startFloatyLoop(){
    if (floatyHandle) return;
    floatyHandle = setInterval(spawnFloatyItem, 650);
  }
  function stopFloatyLoop(){
    if (floatyHandle){ clearInterval(floatyHandle); floatyHandle = null; }
    floatyLayer.innerHTML = '';
  }
  function spawnFloatyItem(){
    if (!measuring) return;
    const el = document.createElement('div');
    const useEmoji = Math.random() < 0.6;
    el.className = 'floaty-item ' + (useEmoji ? 'emoji' : 'phrase');
    el.textContent = useEmoji
      ? FLOAT_EMOJIS[Math.floor(Math.random() * FLOAT_EMOJIS.length)]
      : pickPhrase(lastFloatyHint);
    const leftPct = 8 + Math.random() * 84;
    const drift = (Math.random() * 60 - 30) + 'px';
    const rot = (Math.random() * 30 - 15) + 'deg';
    el.style.left = leftPct + '%';
    el.style.setProperty('--drift', drift);
    el.style.setProperty('--rot', rot);
    floatyLayer.appendChild(el);
    setTimeout(() => el.remove(), 3300);
  }

  function finishMeasuring(){
    showResult(Math.round(bestSmoothed * 100));
  }

  function showResult(score){
    resultScoreEl.textContent = score;
    const tier = getTier(score);
    resultLineEl.textContent = tier.line;
    resultSubEl.textContent = tier.sub;
    if (bestFrameDataUrl){
      resultPhotoEl.src = bestFrameDataUrl;
      resultPhotoEl.classList.remove('hidden');
    } else {
      resultPhotoEl.classList.add('hidden');
    }
    stopCamera();
    showScreen('result');
  }

  function getTier(score){
    if (score >= 75) return { line: '😆 웃음 폭발 위험!', sub: '오늘의 분위기 메이커는 바로 당신!' };
    if (score >= 45) return { line: '😄 함박웃음 인증', sub: '보는 사람도 같이 웃게 만드는 미소예요.' };
    if (score >= 18) return { line: '🙂 살짝 미소 감지', sub: '조금만 더 활짝 웃어볼까요?' };
    if (score >= 5) return { line: '😐 무표정 경보', sub: '카메라가 부끄러웠나봐요. 한 번 더!' };
    return { line: '🥶 썩은 표정 감지', sub: '괜찮아요, 다시 도전하면 분명 웃길 거예요.' };
  }

  // ---------- 카메라 정리 ----------
  function stopCamera(){
    if (stream){
      stream.getTracks().forEach(t => t.stop());
      stream = null;
    }
    if (videoEl && videoEl.parentElement){
      videoEl.parentElement.removeChild(videoEl);
    }
    videoEl = null;
    if (detectLoopHandle){
      clearInterval(detectLoopHandle);
      detectLoopHandle = null;
    }
  }

  // ---------- 돌아가기: 인트로 화면으로 복귀 ----------
  btnBack.addEventListener('click', () => {
    showScreen('intro');
  });

})();
</script>
